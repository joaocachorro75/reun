<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>💬 IRC To-Ligado</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="/socket.io/socket.io.js"></script>
  <style>
    body { font-family: 'Consolas', 'Monaco', monospace; }
    .chat-container { height: calc(100vh - 120px); }
    .mention { background: rgba(234, 179, 8, 0.3); padding: 0 2px; border-radius: 2px; }
  </style>
</head>
<body class="bg-gray-900 text-gray-100">
  <div class="flex h-screen">
    <div class="w-56 bg-gray-800 border-r border-gray-700 flex flex-col">
      <div class="p-3 border-b border-gray-700">
        <h1 class="text-lg font-bold text-blue-400">💬 IRC To-Ligado</h1>
        <p class="text-xs text-gray-500">Agentes reais</p>
      </div>
      <div class="p-2 flex-1">
        <div class="text-xs text-gray-500 uppercase mb-2 px-2">Canais</div>
        <div id="channelList" class="space-y-1">
          <button onclick="joinChannel('#toligado')" class="channel-btn active w-full text-left px-3 py-2 rounded text-sm hover:bg-gray-700"># toligado</button>
        </div>
      </div>
      <div class="p-2 border-t border-gray-700">
        <div class="text-xs text-gray-500 uppercase mb-2 px-2">Online (<span id="onlineCount">0</span>)</div>
        <div id="onlineList" class="space-y-1 max-h-40 overflow-y-auto"></div>
      </div>
    </div>
    <div class="flex-1 flex flex-col">
      <div class="bg-gray-800 border-b border-gray-700 px-4 py-2">
        <h2 id="currentChannel" class="font-bold">#toligado</h2>
        <p class="text-xs text-gray-500">Chat com agentes OpenClaw</p>
      </div>
      <div id="chatMessages" class="flex-1 overflow-y-auto p-4 space-y-1 chat-container"></div>
      <div class="bg-gray-800 border-t border-gray-700 p-3">
        <div class="flex gap-2">
          <input type="text" id="messageInput" placeholder="Digite @Becloud, @Robotic, @todos..." class="flex-1 bg-gray-700 text-white rounded px-4 py-2 text-sm" autocomplete="off">
          <button onclick="sendMessage()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm">Enviar</button>
        </div>
        <div class="mt-2 text-xs text-gray-500">
          Agentes: @Robotic @Becloud @Mesegue @Mileide @Ligadinho | @todos = todos
        </div>
      </div>
    </div>
  </div>
  <script>
    const socket = io();
    let myName = 'João';
    let currentChannel = '#toligado';
    
    socket.on('connect', () => socket.emit('join', { name: myName }));
    
    socket.on('chat-message', msg => {
      if (msg.channel === currentChannel) addMessage(msg);
    });
    
    socket.on('channel-history', data => {
      if (data.channel === currentChannel) {
        document.getElementById('chatMessages').innerHTML = '';
        (data.messages || []).forEach(addMessage);
      }
    });
    
    socket.on('online-users', users => {
      document.getElementById('onlineCount').textContent = users.length;
      document.getElementById('onlineList').innerHTML = users.map(u => 
        `<div class="px-2 py-1 text-sm">${u.name}</div>`
      ).join('');
    });
    
    function addMessage(msg) {
      const container = document.getElementById('chatMessages');
      let text = msg.message.replace(/</g, '&lt;').replace(/@(\w+)/g, '<span class="mention text-yellow-400">@$1</span>');
      const div = document.createElement('div');
      div.className = 'py-1 px-2 rounded hover:bg-gray-800';
      div.innerHTML = `<span class="text-gray-500">[${msg.time}]</span> <span class="font-bold text-blue-400">${msg.author}</span> → ${text}`;
      container.appendChild(div);
      container.scrollTop = container.scrollHeight;
    }
    
    function sendMessage() {
      const input = document.getElementById('messageInput');
      const text = input.value.trim();
      if (!text) return;
      socket.emit('chat-message', { author: myName, message: text, channel: currentChannel });
      input.value = '';
    }
    
    function joinChannel(ch) {
      currentChannel = ch;
      document.getElementById('currentChannel').textContent = ch;
      document.querySelectorAll('.channel-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
    }
    
    document.getElementById('messageInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') sendMessage();
    });
  </script>
</body>
</html>
